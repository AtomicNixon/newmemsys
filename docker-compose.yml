version: "3.9"

services:
  brain:
    # Phase 2: custom image with pgvector + Apache AGE
    # First run: docker compose build  (takes ~3 min, compiles AGE from source)
    # Subsequent runs: docker compose up -d  (uses cached image)
    # To use Phase 1 image without AGE, comment out 'build' and uncomment 'image':
    #   image: pgvector/pgvector:pg16
    build:
      context: .
      dockerfile: Dockerfile
    image: newmemsys_brain:phase2
    container_name: newmemsys_brain
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-memory_system}
      POSTGRES_USER: ${POSTGRES_USER:-memory_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memsys_secure_2026}
    volumes:
      - newmemsys_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-memory_user} -d ${POSTGRES_DB:-memory_system}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  newmemsys_pgdata:
    name: newmemsys_pgdata
